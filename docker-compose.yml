version: "3.9"

services:

  mysql:

    image: mysql:8.4

    container_name: mysql-e9

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dbe8
  
  
    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  migration:

    build: .

    container_name: migration-e9

    depends_on:
      - mysql

    env_file:
      - .env

    command: sh docker/migrate.sh

  backend:

    build: .

    container_name: fastapi-e9

    restart: always

    depends_on:
      - mysql
      - migration

    env_file:
      - .env
    environment:
      - ROOT_PATH=/e9
    ports:
      - "8000:8000"

volumes:

  mysql_data: